<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Store</title>
  </head>
  <body class="text-white">
    <main class="min-h-screen w-full font-[Orbitron,_Rajdhani,_sans-serif]">
      <header class="flex w-full flex-wrap items-center justify-between gap-4 border border-[#121212] bg-black px-4 py-[3px] shadow-[inset_0_-1px_0_rgba(11,173,198,0.45)] sm:flex-nowrap sm:px-6">
        <div class="flex min-w-0 items-center gap-6 sm:gap-10">
          <img src="__LOGO__" alt="Game Store" class="h-[30px] w-auto shrink-0 object-contain" />

          <nav aria-label="Primary navigation" class="hidden sm:block">
            <ul class="flex items-center gap-8 text-[11px] font-medium uppercase tracking-[0.2em] text-white/75">
              <li>
                <a href="#" class="relative block py-4 text-white transition hover:text-white">
                  Home
                  <span class="absolute inset-x-0 bottom-0 border-b-[3px] border-[#ff2b2b]"></span>
                </a>
              </li>
              <li>
                <a href="#" class="block py-4 transition hover:text-white">Games</a>
              </li>
              <li>
                <a href="#" class="block py-4 transition hover:text-white">Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class="ml-auto flex items-center gap-2 sm:gap-3">
          <button
            type="button"
            aria-label="Select language"
            class="grid h-8 w-8 place-items-center rounded-full border border-white/10 transition hover:border-white/30"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 text-white/85">
              <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6" />
              <path d="M4 12h16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.6" />
              <path
                d="M12 4c2.5 2.4 3.8 5.1 3.8 8s-1.3 5.6-3.8 8c-2.5-2.4-3.8-5.1-3.8-8S9.5 6.4 12 4Z"
                fill="none"
                stroke="currentColor"
                stroke-linejoin="round"
                stroke-width="1.6"
              />
            </svg>
          </button>

          <button
            type="button"
            aria-label="Account"
            class="grid h-8 w-8 place-items-center rounded-full border border-white/10 transition hover:border-white/30"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 text-white/85">
              <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6" />
              <path
                d="M6.5 18.5c1.8-2.8 4-4.2 5.5-4.2s3.7 1.4 5.5 4.2"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="1.6"
              />
            </svg>
          </button>

          <button
            type="button"
            class="min-w-[96px] rounded-full border border-white/25 px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.24em] text-white transition hover:border-white/45 sm:min-w-[104px] sm:px-6"
          >
            Login
          </button>

          <button
            type="button"
            class="min-w-[110px] border border-[#ff2b2b] px-4 py-[13px] text-[11px] font-semibold uppercase tracking-[0.24em] text-white transition hover:border-[#ff4040] sm:min-w-[118px] sm:px-6"
          >
            Register
          </button>
        </div>
      </header>
    </main>
  </body>
</html>
