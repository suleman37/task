<html>
  <head>
    <title>Game Store</title>
  </head>
  <body class="text-white">
    <main class="min-h-screen w-full font-[Orbitron,_Rajdhani,_sans-serif]">
      <header class="flex w-full flex-wrap items-center justify-between gap-4 border border-[#121212] bg-black px-4 py-[3px] shadow-[inset_0_-1px_0_rgba(11,173,198,0.45)] sm:flex-nowrap sm:px-6">
        <div class="flex min-w-0 items-center gap-6 sm:gap-10">
          <div class="flex h-[30px] items-center text-sm font-semibold uppercase tracking-[0.24em]">
            Game Store
          </div>

          <nav class="hidden sm:block">
            <ul class="flex items-center gap-8 text-[11px] font-medium uppercase tracking-[0.2em] text-white/75">
              <li>
                <p class="relative block py-4 text-white transition hover:text-white">
                  Home
                  <span class="absolute inset-x-0 bottom-0 border-b-[3px] border-[#ff2b2b]"></span>
                </p>
              </li>
              <li>
                <p class="block py-4 transition hover:text-white">Games</p>
              </li>
              <li>
                <p class="block py-4 transition hover:text-white">Help</p>
              </li>
            </ul>
          </nav>
        </div>

        <div class="ml-auto flex items-center gap-2 sm:gap-3">
          <button class="grid h-8 w-8 place-items-center rounded-full border border-white/10 text-[10px] font-semibold uppercase tracking-[0.16em] transition hover:border-white/30">
            EN
          </button>

          <button class="grid h-8 w-8 place-items-center rounded-full border border-white/10 text-[10px] font-semibold uppercase tracking-[0.16em] transition hover:border-white/30">
            Me
          </button>

          <button class="min-w-[96px] rounded-full border border-white/25 px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.24em] text-white transition hover:border-white/45 sm:min-w-[104px] sm:px-6">
            Login
          </button>

          <button class="min-w-[110px] border border-[#ff2b2b] px-4 py-[13px] text-[11px] font-semibold uppercase tracking-[0.24em] text-white transition hover:border-[#ff4040] sm:min-w-[118px] sm:px-6">
            Register
          </button>
        </div>
      </header>
    </main>
  </body>
</html>
